name: Attach APK to Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach APK to'
        required: true
        default: 'v1.0'
      source_release:
        description: 'Source release to get APK from'
        required: true
        default: 'latest-debug'

jobs:
  attach-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK from source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.source_release }}" \
            -R LandonMoran/TitanConquestA11y \
            -p "*.apk" \
            -D /tmp

      - name: Upload APK to target release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.release_tag }}
        run: |
          SRC=$(ls /tmp/*.apk | head -1)
          # Publish under a clean, version-stamped name (no "debug" in it).
          CLEAN="TitanConquestA11y-${TAG#v}.apk"
          cp "$SRC" "$CLEAN"
          echo "Uploading $CLEAN to $TAG"
          # Remove any stale differently-named asset (e.g. an old -debug.apk)
          # so the release ends up with exactly one APK.
          for old in $(gh release view "$TAG" -R LandonMoran/TitanConquestA11y \
                        --json assets -q '.assets[].name' | grep '\.apk$' || true); do
            if [ "$old" != "$CLEAN" ]; then
              gh release delete-asset "$TAG" "$old" -R LandonMoran/TitanConquestA11y --yes || true
            fi
          done
          gh release upload "$TAG" "$CLEAN" \
            -R LandonMoran/TitanConquestA11y \
            --clobber
