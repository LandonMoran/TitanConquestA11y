name: Attach APK to Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach APK to'
        required: true
        default: 'v1.0'
      source_release:
        description: 'Source release to get APK from'
        required: true
        default: 'latest-debug'

jobs:
  attach-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK from source release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.inputs.source_release }}" \
            -R LandonMoran/TitanConquestA11y \
            -p "*.apk" \
            -D /tmp

      - name: Upload APK to target release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=$(ls /tmp/*.apk | head -1)
          echo "Uploading $APK to ${{ github.event.inputs.release_tag }}"
          gh release upload "${{ github.event.inputs.release_tag }}" "$APK" \
            -R LandonMoran/TitanConquestA11y \
            --clobber
