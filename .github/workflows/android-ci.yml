name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Test & Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk TitanConquestA11y-debug.apk

      - name: Publish debug APK to latest-debug release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-debug --yes 2>/dev/null || true
          gh release create latest-debug \
            --title "Latest Debug Build" \
            --notes "Auto-updated debug APK from the latest commit on main. Install via ADB or sideload directly." \
            --prerelease \
            TitanConquestA11y-debug.apk

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ── Release (tag only) ────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [ build, lint ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode and setup keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "ERROR: RELEASE_KEYSTORE_B64 secret not set. Cannot build signed release."
            exit 1
          fi
          echo "Keystore secret length: ${#KEYSTORE_B64}"
          echo "$KEYSTORE_B64" | base64 -d > app/titanconquest.jks
          echo "Keystore file created:"
          ls -lh app/titanconquest.jks
          echo "Verifying keystore:"
          file app/titanconquest.jks
          keytool -list -keystore app/titanconquest.jks -storepass titanconquest123 -noprompt | head -5

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/titanconquest.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Check APK Output
        run: |
          echo "Looking for APK files:"
          find app/build/outputs -name "*.apk" -type f
          echo "Release APK details:"
          ls -lh app/build/outputs/apk/release/ 2>/dev/null || echo "No release directory found"

      - name: Rename Release APK
        run: cp app/build/outputs/apk/release/app-release.apk TitanConquestA11y-release.apk

      - name: Verify APK is ready
        run: |
          echo "Checking if APK exists before release..."
          if [ ! -f TitanConquestA11y-release.apk ]; then
            echo "ERROR: TitanConquestA11y-release.apk not found!"
            ls -lh *.apk 2>/dev/null || echo "No APK files in current directory"
            exit 1
          fi
          echo "✓ APK ready: $(ls -lh TitanConquestA11y-release.apk)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          TAG="${{ github.ref_name }}"
          echo "Creating release for tag: $TAG"

          gh release create "$TAG" \
            --title "TitanConquest A11y $TAG" \
            --notes "An accessible Android client for Titan Conquest, built with full TalkBack support. Download the APK and install via ADB or sideload." \
            --prerelease \
            TitanConquestA11y-release.apk

          echo "✓ Release created successfully"
