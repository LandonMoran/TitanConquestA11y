name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Test & Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk TitanConquestA11y-debug.apk

      - name: Publish debug APK to latest-debug release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-debug --yes 2>/dev/null || true
          gh release create latest-debug \
            --title "Latest Debug Build" \
            --notes "Auto-updated debug APK from the latest commit on main. Install via ADB or sideload directly." \
            --prerelease \
            TitanConquestA11y-debug.apk

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ── Release (tag only) ────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [ build, lint ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > app/titanconquest.jks

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/titanconquest.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Environment check:"
          echo "  KEYSTORE_FILE: $KEYSTORE_FILE"
          echo "  File exists: $(test -f "$KEYSTORE_FILE" && echo yes || echo no)"
          echo "  KEYSTORE_PASSWORD length: ${#KEYSTORE_PASSWORD}"
          echo "  KEY_ALIAS: $KEY_ALIAS"
          echo "  KEY_PASSWORD length: ${#KEY_PASSWORD}"
          echo ""
          echo "Running gradle build..."
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -100

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Step 1: List outputs directory"
          ls -la app/build/outputs/ || echo "outputs dir not found"

          echo ""
          echo "Step 2: Find APK files"
          find app/build/outputs -name "*.apk" -type f

          echo ""
          echo "Step 3: Get first APK"
          APK_FILE=$(find app/build/outputs -name "*.apk" -type f | head -1)
          echo "APK_FILE='$APK_FILE'"

          if [ ! -z "$APK_FILE" ] && [ -f "$APK_FILE" ]; then
            echo "✓ APK exists: $APK_FILE"
            ls -lh "$APK_FILE"

            echo ""
            echo "Step 4: Copy APK"
            cp "$APK_FILE" "app.apk"
            ls -lh app.apk

            echo ""
            echo "Step 5: Create or upload release"
            TAG="${{ github.ref_name }}"
            echo "TAG=$TAG"

            gh release create "$TAG" app.apk \
              --title "TitanConquest A11y $TAG" \
              --notes "Accessible Android client for Titan Conquest" \
              --prerelease 2>&1 || true

            echo ""
            echo "Step 6: If create failed, try upload"
            gh release upload "$TAG" app.apk --clobber 2>&1 || echo "Upload failed too"

            echo "✓ Done"
          else
            echo "ERROR: APK not found"
            exit 1
          fi
