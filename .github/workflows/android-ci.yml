name: Android CI

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Build & Test ──────────────────────────────────────────────────────────────
  build:
    name: Test & Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > app/titanconquest.jks

      - name: Build Debug APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/titanconquest.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk TitanConquestA11y-debug.apk

      - name: Publish debug APK to latest-debug release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-debug --yes 2>/dev/null || true
          gh release create latest-debug \
            --title "Latest Debug Build" \
            --notes "Auto-updated debug APK from the latest commit on main. Install via ADB or sideload directly." \
            --prerelease \
            TitanConquestA11y-debug.apk

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lintDebug --stacktrace --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ── Release (tag only) ────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [ build, lint ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.9.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > app/titanconquest.jks

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/titanconquest.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "TitanConquest A11y $TAG" \
            --notes "$(cat <<'EOF'
          ## TitanConquest Accessibility Client — ${{ github.ref_name }}

          An accessible Android client for [Titan Conquest](https://titanconquest.com), built for blind and visually impaired players using TalkBack.

          ### What this does
          - **Full TalkBack support** — every screen, button, stat, and enemy has a meaningful content description so TalkBack reads the right thing
          - **Patrol & combat** — browse enemies, see their HP and tier, and launch Primary / Special / Heavy attacks all via swipe navigation
          - **Hero stats** — HP, XP, Drachma, Power, and Location Points read aloud with progress context
          - **Locations** — see which areas are unlocked and travel between them
          - **Bounties** — accept and claim daily bounties with progress tracking
          - **Chat** — read global and clan chat, send messages
          - **Gear** — browse your inventory with rarity, slot, perks, and infusion level announced
          - **WCAG AA/AAA colours** — high-contrast Material 3 theme works for low-vision users without TalkBack

          ### Installation
          Download the APK below and sideload it, or install via ADB:
          ```
          adb install TitanConquestA11y-release.apk
          ```

          ### Notes
          - Requires Android 8.0 (API 26) or higher
          - Needs an existing Titan Conquest account at titanconquest.com
          EOF
          )" \
            --prerelease \
            app/build/outputs/apk/release/app-release-unsigned.apk#TitanConquestA11y-release.apk
